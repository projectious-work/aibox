# =============================================================================
# Yazi configuration — aibox defaults
# Docs: https://yazi-rs.github.io/docs/configuration/yazi
# =============================================================================

[mgr]
ratio = [3, 5, 18]          # parent : current : preview (preview-heavy default)
sort_by = "natural"
sort_sensitive = false
sort_dir_first = true
show_hidden = true
show_symlink = true

[preview]
max_width = 600
max_height = 900
# Reduced from 100ms → 30ms render delay; also reduces Zellij Sixel artifacts
# by letting the terminal settle before committing pixels.
image_delay = 30
# Prefer chafa halfblock inside Zellij (Sixel can cause ghost artifacts in
# Zellij's rendering pipeline). Falls back automatically if chafa is absent.
image_filter = "nearest"

# =============================================================================
# Plugin — file previewers
# =============================================================================
# prepend_previewers runs before yazi's built-in previewers, so these rules
# take precedence. Supported built-in run values: image, pdf, video, archive.
# Custom plugins live in ~/.config/yazi/plugins/<name>.yazi/init.lua.
#
# Format coverage:
#   Raster (JPG/PNG/GIF/WebP/BMP/TIFF) — chafa handles all natively; yazi's
#     built-in "image" previewer calls chafa automatically when available.
#   SVG — resvg converts to PNG; yazi's "image" previewer renders the result.
#   PDF — yazi's built-in "pdf" previewer calls pdftoppm (poppler-utils).
#   EPS  — custom lua plugin (eps.yazi) converts via ghostscript then "image".
#   .excalidraw — JSON-based design files; no TUI preview possible. Yazi falls
#     back to text preview automatically (known limitation: raw JSON is shown).
[plugin]
# git.yazi: run before built-in fetchers so git status is available for all
# files and directories. init.lua calls require("git"):setup {} to register
# the linemode renderer that shows status signs next to file names.
prepend_fetchers = [
    { id = "git", url = "*",  run = "git" },
    { id = "git", url = "*/", run = "git" },
]

prepend_previewers = [
    # SVG: convert to raster with resvg, then display as image
    { url = "*.svg", run = "svg" },
    # EPS: convert to PNG with ghostscript, then display as image
    { url = "*.eps", run = "eps" },
    # Raster images — explicit name rules ensure all extensions are covered
    # even if MIME detection fails (e.g. for BMP/TIFF without magic bytes).
    { url = "*.jpg",  run = "image" },
    { url = "*.jpeg", run = "image" },
    { url = "*.png",  run = "image" },
    { url = "*.gif",  run = "image" },
    { url = "*.webp", run = "image" },
    { url = "*.bmp",  run = "image" },
    { url = "*.tiff", run = "image" },
    { url = "*.tif",  run = "image" },
    # PDF
    { url = "*.pdf",  run = "pdf" },
]

[opener]
# Enter: open in vim in-place (suspends yazi, returns on :q)
edit = [
    { run = '${EDITOR:-vim} "$@"', desc = "Edit in-place", block = true },
]
# For opening in the adjacent vim pane (dev layout: vim is right of yazi)
edit-pane = [
    { run = 'open-in-editor "$1"', desc = "Open in vim pane", block = false },
]

[open]
rules = [
    { name = "*/", use = "edit" },
    { mime = "text/*", use = "edit" },
    { mime = "application/json", use = "edit" },
    { mime = "application/toml", use = "edit" },
    { mime = "application/x-yaml", use = "edit" },
    { mime = "application/xml", use = "edit" },
    { mime = "application/x-sh", use = "edit" },
    { mime = "application/x-shellscript", use = "edit" },
    { mime = "inode/x-empty", use = "edit" },
    { name = "*.md", use = "edit" },
    { name = "*.rs", use = "edit" },
    { name = "*.toml", use = "edit" },
    { name = "*.kdl", use = "edit" },
    { name = "*.py", use = "edit" },
    { name = "*.sh", use = "edit" },
    { name = "*.yml", use = "edit" },
    { name = "*.yaml", use = "edit" },
    { name = "*.json", use = "edit" },
    { name = "*.tex", use = "edit" },
    { name = "*.typ", use = "edit" },
    { name = "*.html", use = "edit" },
    { name = "*.css", use = "edit" },
    { name = "*.js", use = "edit" },
    { name = "*.ts", use = "edit" },
    { name = "*", use = "edit" },
]
