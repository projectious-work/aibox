name: docs-docusaurus
version: "1.1.0"
description: "Docusaurus static docs site (React/MDX)"
requires:
  - node

skills:
  - documentation

builder_weight: null

tools:
  - name: docusaurus
    default_enabled: true
    default_version: "3.7.0"
    supported_versions: ["3.7.0"]

builder: null

runtime: |
  # Addon: docs-docusaurus
  RUN npm install -g @docusaurus/core@{{ tools.docusaurus.version }}
